# =============================================================================
# Azure AI Foundry Model Deployments - GlobalStandard (Pay-as-you-go)
# All models use GlobalStandard SKU = no running cost, pay only when used
# Source: https://learn.microsoft.com/en-us/azure/ai-foundry/foundry-models/concepts/models-sold-directly-by-azure
#
# Optional per-entry flags used by infra/scripts/deploy_models.py:
#   enabled: false
#   runModes: [manual, hook]
#   allowedRegions: [eastus2, swedencentral]
#   requiresRegistration: true
#   registrationUrl: https://aka.ms/oai/gpt5access
#   notes: Human-readable deployment note
# Commented-out entries later in this file are archival references only.
# Re-check Microsoft Learn before enabling them; some old inline availability notes
# are intentionally left non-authoritative.
# =============================================================================

